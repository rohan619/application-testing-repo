apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: test-app
        image: us-central1-docker.pkg.dev/project-4b96061c-a0d1-4f8c-ac8/my-docker-repo/app-image:539aab2326a4fd9620a38658108c43c0ce291553
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: test-app
spec:
  type: NodePort
  selector:
    app: test-app
  ports:
  - port: 80
    targetPort: 8000
